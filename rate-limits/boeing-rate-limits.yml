specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Boeing
providerId: boeing
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Aviation
  - Aerospace
  - Rate Limiting
description: Boeing does not publish a public API rate-limit policy. Boeing's commercial, defense, and
  services businesses operate under contract; integration controls live inside the relevant
  enterprise / fleet agreement (Boeing Global Services, Jeppesen, Digital Aviation Solutions,
  ForeFlight) rather than on a public developer portal.
sources:
  - https://www.boeing.com
notes: No public Boeing API rate-limit documentation. Reconcile against the active enterprise / fleet
  contract or product-specific developer documentation (Jeppesen, ForeFlight) when applicable.
responseCodes:
  throttled: 429
limits:
  - name: Boeing Services / Digital APIs
    scope: contract
    metric: varies
    limit: see active Boeing services / digital agreement
    notes: Per-customer request rate, concurrency, and quota windows governed by individual
      contracts; no public values exist on boeing.com.
policies:
  - name: Backoff
    description: Clients receiving a 429 should respect Retry-After when present and apply
      exponential backoff with jitter.
  - name: Contractual escalation
    description: Throttling adjustments and quota raises are handled through the Boeing services /
      digital customer success contact rather than self-service.
maintainers:
