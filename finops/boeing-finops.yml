specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Boeing
providerId: boeing
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Aviation
  - Aerospace
description: 'FOCUS-aligned FinOps placeholder for Boeing: not a developer-facing platform. Spend
  with Boeing flows through commercial-airplane purchase contracts, defense / space programs, and
  services / digital subscriptions (Boeing Global Services, Jeppesen, ForeFlight, Digital Aviation
  Solutions). No public per-API billing surface.'
sources:
  - https://www.boeing.com
notes: Boeing has no public API billing surface; reconcile against the active contract for actual
  fee structure.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: The Boeing Company
serviceCategory: Aerospace / Aviation Services
billingModel:
  pricingCategory: Capital Purchase + Services Subscription (Negotiated)
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Boeing
  ServiceCategory: Aerospace
  ProviderName: Boeing
  PublisherName: The Boeing Company
  InvoiceIssuerName: The Boeing Company
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: aircraft_purchases
    unit: aircraft
    aggregation: count
    dimensions:
      - model
      - configuration
  - name: services_subscription
    unit: year
    aggregation: sum
    dimensions:
      - product
      - tail_number
  - name: jeppesen_subscriptions
    unit: year
    aggregation: sum
    dimensions:
      - product
      - region
  - name: foreflight_seats
    unit: seat
    aggregation: max
    dimensions:
      - tier
principles:
  - name: Visibility
    description: Use Boeing customer-services portals (Toolbox / MyBoeingFleet) and Jeppesen /
      ForeFlight admin consoles to track active subscriptions and per-tail entitlements.
  - name: Allocation
    description: Map services subscriptions and digital licenses to consuming fleets / pilot
      groups for chargeback against the bundled Boeing invoice.
  - name: Optimization
    description: Reclaim unused Jeppesen / ForeFlight seats during annual renewal; align Digital
      Aviation Solutions subscriptions with active fleet composition; consolidate vendors where
      Boeing Global Services covers the same scope.
  - name: Accountability
    description: Designate a Boeing services contract owner per fleet; review utilization
      quarterly with Boeing Global Services and Jeppesen account teams.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
